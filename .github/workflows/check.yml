name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          severity: warning

  make-help:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: make help renders
        run: make help
      - name: Makefile targets parse
        run: make -n all
